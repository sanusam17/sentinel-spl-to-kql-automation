name: SPL to KQL

on:
  push:
    paths:
      - "spl-rules/*.spl"

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install google-generativeai

      - name: Generate KQL
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/spl_to_kql.py

      - name: Create Pull Request (Manual Approval Gate)
        uses: peter-evans/create-pull-request@v6
        with:
          branch: kql-generated
          title: "SPL → KQL Conversion Pending Review"
          commit-message: "Auto-generated KQL from SPL"
          body: |
            🚨 Review required
            - Validate logic
            - Approve before ARM conversion