name: Detection Content Pipeline

on:
  push:
    paths:
      - 'spl-rules/*.spl'

permissions:
  contents: write

jobs:

  spl_to_kql:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Gemini SDK
      run: |
        python --version
        pip list
        python -c "from google import genai; print('Gemini SDK Loaded Successfully')"
   
    - name: Show Script
      run: |
        cat scripts/process_all_rules.py

    - name: Generate KQL
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/process_all_rules.py

    - name: Commit KQL
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add kql-rules/*.kql || true

        git diff --cached --quiet || git commit -m "Generated KQL Rules"

        git push

  engineer_review:

    needs: spl_to_kql

    runs-on: ubuntu-latest

    environment:
      name: Detection-Review

    steps:

    - name: Await Approval
      run: echo "Awaiting Detection Engineer Approval"

  validate_kql:

    needs: engineer_review

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Gemini SDK
      run: |
        python -c "from google import genai; print('Gemini SDK Loaded Successfully')"

    - name: Validate KQL
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/validate_kql.py

  generate_arm:

    needs: validate_kql

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Gemini SDK
      run: |
        python -c "from google import genai; print('Gemini SDK Loaded Successfully')"

    - name: Generate ARM
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/generate_arm.py

    - name: Commit ARM Templates
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add arm-templates/*.json || true

        git diff --cached --quiet || git commit -m "Generated ARM Templates"

        git push